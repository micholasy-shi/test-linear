# NovaClaw Docker Compose Configuration

services:
  novaclaw:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: novaclaw:latest
    container_name: novaclaw-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NOVACLAW_PORT=3000
      - NOVACLAW_BIND=0.0.0.0
      - NOVACLAW_WORKSPACE=/app/workspace
      - NOVACLAW_LOG_LEVEL=info
      # AI Model API Keys (uncomment and configure as needed)
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      # Persistent workspace
      - novaclaw-workspace:/app/workspace
      # Skills directory
      - ./skills:/app/skills:ro
      # Configuration
      - ./novaclaw.yml:/app/novaclaw.yml:ro
      # Logs
      - novaclaw-logs:/app/logs
    restart: unless-stopped
    networks:
      - novaclaw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Optional: Redis for caching (uncomment to enable)
